<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Expenses — AutoDealerDashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/expenses.css" />
  </head>
  <body class="antialiased dashboard-gradient text-slate-800">
    <header class="header-glass sticky top-0 z-30">
      <nav class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button id="mobile-menu-btn" class="md:hidden text-white p-2 hover:bg-white/20 rounded-lg transition-all" onclick="toggleMobileMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <a class="flex items-center gap-3 text-white hover:opacity-90 transition-opacity" href="dashboard.html">
            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-white/20 backdrop-blur-sm flex items-center justify-center text-white font-bold text-base md:text-lg shadow-lg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-7 md:w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
              </svg>
            </div>
            <div>
              <div class="font-bold text-lg md:text-xl">Momai Auto</div>
              <div class="text-xs md:text-sm text-white/80">Inventory</div>
            </div>
          </a>
        </div>
        <div class="flex items-center gap-3 md:gap-4">
          <div class="hidden md:flex items-center gap-2 text-white/90 bg-white/10 rounded-lg px-3 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span class="text-sm font-medium">Admin</span>
          </div>
          <a href="login.html" class="text-sm text-white bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition-all font-medium">Logout</a>
        </div>
      </nav>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu-overlay" class="mobile-menu-overlay" onclick="toggleMobileMenu()"></div>

    <div class="max-w-7xl mx-auto p-3 md:p-6">
      <div class="flex gap-4 md:gap-6">
        <!-- Sidebar -->
        <aside id="mobile-sidebar" class="fixed md:relative inset-y-0 left-0 w-72 dashboard-sidebar mobile-sidebar z-50 md:z-auto">
          <div class="h-screen md:h-auto overflow-y-auto p-4">
            <div class="mb-6">
              <div class="flex items-center gap-3 p-4 bg-gradient-to-br from-indigo-50 to-white rounded-xl border border-indigo-100">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-600 text-white flex items-center justify-center font-bold shadow-lg">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                </div>
                <div>
                  <div class="font-bold text-slate-800">Momai Auto</div>
                  <div class="text-xs text-slate-500">Dealer Finance</div>
                </div>
              </div>
            </div>
            <nav class="space-y-1 text-sm">
              <a href="dashboard.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Dashboard
              </a>
              <a href="inventory.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                Inventory
              </a>
              <a href="#">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Sales
              </a>
              <a href="expenses.html" class="active">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                Expenses
              </a>
              <a href="receivables.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
                Receivables
              </a>
              <a href="payables.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
                Payables
              </a>
              <a href="parties.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 8.048M12 4.354c-2.668 1.486-4 2.88-4 5.316 0 2.434 1.332 3.83 4 5.316m0-8.632c2.668 1.486 4 2.88 4 5.316 0 2.434-1.332 3.83-4 5.316M9 20h6a2 2 0 002-2v-1a6 6 0 00-12 0v1a2 2 0 002 2z" />
                </svg>
                Parties
              </a>
              <a href="cash_ledger.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Cash Ledger
              </a>
            </nav>
          </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1">
              <div class="p-4 bg-white rounded-lg shadow-card">
                <h3 class="font-medium text-slate-700">Add Expense</h3>
                <form id="expense-form" class="mt-4 space-y-3">
                  <div>
                    <label class="block text-sm text-slate-600">Category</label>
                    <select id="category" required class="w-full mt-1 p-2 border rounded">
                      <option value="repair">repair</option>
                      <option value="mechanic">mechanic</option>
                      <option value="transport">transport</option>
                      <option value="fuel">fuel</option>
                      <option value="rent">rent</option>
                      <option value="misc">misc</option>
                    </select>
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Amount</label>
                    <input id="amount" type="number" step="0.01" min="0" required class="w-full mt-1 p-2 border rounded" />
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Date</label>
                    <input id="date" type="date" class="w-full mt-1 p-2 border rounded" />
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Bike ID (optional)</label>
                    <input id="bike_id" type="number" min="0" class="w-full mt-1 p-2 border rounded" />
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Notes</label>
                    <textarea id="notes" rows="3" class="w-full mt-1 p-2 border rounded"></textarea>
                  </div>

                  <div class="flex items-center gap-3">
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Save Expense</button>
                    <div id="form-status" class="text-sm text-slate-600"></div>
                  </div>
                </form>
              </div>
            </div>

            <div class="lg:col-span-2">
              <div class="p-4 bg-white rounded-lg shadow-card">
                <h3 class="font-medium text-slate-700">Recent Expenses</h3>
                <div class="mt-4 overflow-x-auto">
                  <table id="expenses-table" class="w-full text-left text-sm">
                    <thead class="text-slate-600">
                      <tr>
                        <th class="py-2">Date</th>
                        <th class="py-2">Category</th>
                        <th class="py-2">Bike ID</th>
                        <th class="py-2">Amount</th>
                        <th class="py-2">Notes</th>
                        <th class="py-2">Action</th>
                      </tr>
                    </thead>
                    <tbody id="expenses-tbody">
                      <tr><td colspan="6" class="py-6 text-center text-slate-500">Loading...</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      function toggleMobileMenu() {
        const overlay = document.getElementById('mobile-menu-overlay');
        const sidebar = document.getElementById('mobile-sidebar');
        overlay.classList.toggle('active');
        sidebar.classList.toggle('active');
      }
    </script>
    <script type="module" src="js/expenses.js"></script>
  </body>
</html>
