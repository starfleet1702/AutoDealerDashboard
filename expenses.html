<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Expenses — AutoDealerDashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/expenses.css" />
  </head>
  <body class="antialiased bg-gray-50 text-slate-800">
    <header class="bg-white">
      <nav class="max-w-6xl mx-auto p-4 flex items-center justify-between">
        <a class="flex items-center gap-3 text-slate-900" href="dashboard.html">
          <div class="w-10 h-10 rounded-md bg-indigo-500 flex items-center justify-center text-white font-bold">AD</div>
          <span class="font-semibold text-lg">AutoDealerDashboard</span>
        </a>
        <div class="flex items-center gap-4">
          <a href="login.html" class="text-sm text-indigo-600 hover:text-indigo-800">Logout</a>
        </div>
      </nav>
    </header>

    <div class="max-w-7xl mx-auto p-6">
      <div class="flex gap-6">
        <!-- Sidebar -->
        <aside class="w-64 hidden md:block sidebar">
          <div class="p-4 bg-white rounded-lg shadow-card">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-9 h-9 rounded bg-indigo-500 text-white flex items-center justify-center font-bold">AD</div>
              <div>
                <div class="font-semibold text-slate-800">AutoDealerDashboard</div>
                <div class="text-sm text-slate-500">Dealer Finance</div>
              </div>
            </div>
            <nav class="space-y-2 text-sm">
              <a href="dashboard.html" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">Dashboard</a>
              <a href="inventory.html" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">Inventory</a>
              <a href="#" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">Sales</a>
              <a href="expenses.html" class="block px-3 py-2 rounded bg-indigo-50 font-medium text-indigo-700">Expenses</a>
              <a href="receivables.html" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">Receivables</a>
              <a href="payables.html" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">Payables</a>
              <a href="cash_ledger.html" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">Cash Ledger</a>
            </nav>
          </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1">
              <div class="p-4 bg-white rounded-lg shadow-card">
                <h3 class="font-medium text-slate-700">Add Expense</h3>
                <form id="expense-form" class="mt-4 space-y-3">
                  <div>
                    <label class="block text-sm text-slate-600">Category</label>
                    <select id="category" required class="w-full mt-1 p-2 border rounded">
                      <option value="repair">repair</option>
                      <option value="mechanic">mechanic</option>
                      <option value="transport">transport</option>
                      <option value="fuel">fuel</option>
                      <option value="rent">rent</option>
                      <option value="misc">misc</option>
                    </select>
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Amount</label>
                    <input id="amount" type="number" step="0.01" min="0" required class="w-full mt-1 p-2 border rounded" />
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Date</label>
                    <input id="date" type="date" class="w-full mt-1 p-2 border rounded" />
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Bike ID (optional)</label>
                    <input id="bike_id" type="number" min="0" class="w-full mt-1 p-2 border rounded" />
                  </div>

                  <div>
                    <label class="block text-sm text-slate-600">Notes</label>
                    <textarea id="notes" rows="3" class="w-full mt-1 p-2 border rounded"></textarea>
                  </div>

                  <div class="flex items-center gap-3">
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Save Expense</button>
                    <div id="form-status" class="text-sm text-slate-600"></div>
                  </div>
                </form>
              </div>
            </div>

            <div class="lg:col-span-2">
              <div class="p-4 bg-white rounded-lg shadow-card">
                <h3 class="font-medium text-slate-700">Recent Expenses</h3>
                <div class="mt-4 overflow-x-auto">
                  <table id="expenses-table" class="w-full text-left text-sm">
                    <thead class="text-slate-600">
                      <tr>
                        <th class="py-2">Date</th>
                        <th class="py-2">Category</th>
                        <th class="py-2">Bike ID</th>
                        <th class="py-2">Amount</th>
                        <th class="py-2">Notes</th>
                        <th class="py-2">Action</th>
                      </tr>
                    </thead>
                    <tbody id="expenses-tbody">
                      <tr><td colspan="6" class="py-6 text-center text-slate-500">Loading...</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="js/expenses.js"></script>
  </body>
</html>
