<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Inventory — Momai Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/inventory.css" />
  </head>
  <body class="antialiased dashboard-gradient text-slate-800">
    <header class="header-glass sticky top-0 z-30">
      <nav class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button id="mobile-menu-btn" class="md:hidden text-white p-2 hover:bg-white/20 rounded-lg transition-all" onclick="toggleMobileMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <a class="flex items-center gap-3 text-white hover:opacity-90 transition-opacity" href="dashboard.html">
            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-white/20 backdrop-blur-sm flex items-center justify-center text-white font-bold text-base md:text-lg shadow-lg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-7 md:w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
              </svg>
            </div>
            <div>
              <div class="font-bold text-lg md:text-xl">Momai Auto</div>
              <div class="text-xs md:text-sm text-white/80">Inventory</div>
            </div>
          </a>
        </div>
        <div class="flex items-center gap-3 md:gap-4">
          <div class="hidden md:flex items-center gap-2 text-white/90 bg-white/10 rounded-lg px-3 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span class="text-sm font-medium">Admin</span>
          </div>
          <a href="dashboard.html" class="text-sm text-white bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition-all font-medium">Dashboard</a>
        </div>
      </nav>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu-overlay" class="mobile-menu-overlay" onclick="toggleMobileMenu()"></div>

    <div class="max-w-7xl mx-auto p-3 md:p-6">
      <div class="flex gap-4 md:gap-6">
        <!-- Sidebar -->
        <aside id="mobile-sidebar" class="fixed md:relative inset-y-0 left-0 w-72 dashboard-sidebar mobile-sidebar z-50 md:z-auto">
          <div class="h-screen md:h-auto overflow-y-auto p-4">
            <div class="mb-6">
              <div class="flex items-center gap-3 p-4 bg-gradient-to-br from-indigo-50 to-white rounded-xl border border-indigo-100">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-600 text-white flex items-center justify-center font-bold shadow-lg">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                </div>
                <div>
                  <div class="font-bold text-slate-800">Momai Auto</div>
                  <div class="text-xs text-slate-500">Dealer Finance</div>
                </div>
              </div>
            </div>
            <nav class="space-y-1 text-sm">
              <a href="dashboard.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Dashboard
              </a>
              <a href="inventory.html" class="active">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                Inventory
              </a>
              <a href="sales.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Sales
              </a>
              <a href="expenses.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                Expenses
              </a>
              <a href="receivables.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
                Receivables
              </a>
              <a href="payables.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
                Payables
              </a>
              <a href="parties.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 8.048M12 4.354c-2.668 1.486-4 2.88-4 5.316 0 2.434 1.332 3.83 4 5.316m0-8.632c2.668 1.486 4 2.88 4 5.316 0 2.434-1.332 3.83-4 5.316M9 20h6a2 2 0 002-2v-1a6 6 0 00-12 0v1a2 2 0 002 2z" />
                </svg>
                Parties
              </a>
              <a href="cash_ledger.html">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Cash Ledger
              </a>
            </nav>
          </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 min-w-0" x-data="inventory()" x-init="load()">
      
      <!-- Page Loading Spinner -->
      <div x-show="pageLoading" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg flex flex-col items-center gap-4">
          <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
          <p class="text-slate-600 font-medium">Loading inventory...</p>
        </div>
      </div>

      <div class="flex flex-col lg:flex-row gap-4 md:gap-6" x-show="!pageLoading">
        <!-- Inventory List LEFT -->
        <div class="flex-1 order-1 lg:order-1">
          <!-- Inventory List UI -->
          <section id="inventory-list" class="bg-white p-5 md:p-6 rounded-xl shadow-card border border-slate-100">
            <!-- Status Filters -->
            <div class="mb-4">
              <div class="text-sm font-medium text-slate-700 mb-2">Filter by Status:</div>
              <div class="flex flex-wrap gap-2">
                <button type="button" @click="selectedStatus = 'in_stock'; filterBikes()" :class="selectedStatus === 'in_stock' ? 'btn-primary' : 'btn-secondary'" class="text-sm py-1.5 px-3">
                  In Stock
                </button>
                <button type="button" @click="selectedStatus = 'sold'; filterBikes()" :class="selectedStatus === 'sold' ? 'btn-primary' : 'btn-secondary'" class="text-sm py-1.5 px-3">
                  Sold
                </button>
                <button type="button" @click="selectedStatus = 'ready'; filterBikes()" :class="selectedStatus === 'ready' ? 'btn-primary' : 'btn-secondary'" class="text-sm py-1.5 px-3">
                  Ready
                </button>
                <button type="button" @click="selectedStatus = 'in_repair'; filterBikes()" :class="selectedStatus === 'in_repair' ? 'btn-primary' : 'btn-secondary'" class="text-sm py-1.5 px-3">
                  In Repair
                </button>
                <button type="button" @click="selectedStatus = 'not_ready'; filterBikes()" :class="selectedStatus === 'not_ready' ? 'btn-primary' : 'btn-secondary'" class="text-sm py-1.5 px-3">
                  Not Ready
                </button>
                <button type="button" @click="selectedStatus = 'all'; filterBikes()" :class="selectedStatus === 'all' ? 'btn-primary' : 'btn-secondary'" class="text-sm py-1.5 px-3">
                  All
                </button>
              </div>
            </div>

            <div class="flex items-center justify-between mb-3">
              <h3 class="text-lg font-semibold">Inventory List</h3>
              <div class="flex items-center gap-3">
                <div class="relative">
                  <input x-model="searchQuery" @input="filterBikes()" type="text" placeholder="Search bikes..." class="input pl-10 pr-10 w-48 text-sm" />
                  <button type="button" @click="toggleSearch()" class="absolute left-2 top-1.5 text-slate-400 hover:text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" /></svg>
                  </button>
                  <button type="button" @click="searchQuery = ''; filterBikes()" x-show="searchQuery.length > 0" class="absolute right-2 top-1.5 text-slate-400 hover:text-red-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                  </button>
                </div>
                <button type="button" @click="toggleAddBikeForm()" class="btn-primary text-sm py-2 px-4 flex items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                  Add Bike
                </button>
              </div>
            </div>
            <template x-if="true">
              <div class="mb-3 flex gap-6 items-center justify-between">
                <div class="flex gap-6 items-center">
                  <div class="text-sm font-medium text-slate-700">Showing: <span x-text="filteredBikes.length"></span></div>
                  <div x-show="selectedStatus === 'in_stock' || selectedStatus === 'all'" class="text-sm font-medium text-green-700">In stock: <span x-text="filteredBikes.filter(b=>b.status==='in_stock').length"></span></div>
                </div>
                <div x-show="selectedStatus === 'in_stock' || selectedStatus === 'all'" class="text-lg font-semibold text-indigo-700">Inventory Value: ₹<span x-text="filteredBikes.filter(b=>b.status==='in_stock').reduce((s,b)=>s+Number(b.total_cost||0),0).toLocaleString()"></span></div>
              </div>
            </template>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 max-h-[60vh] overflow-auto">
              <template x-for="b in filteredBikes" :key="b.id">
                <div class="p-3 bg-white border border-slate-200 rounded-lg shadow-card flex flex-col gap-2">
                  <div class="flex justify-between items-start mb-2">
                    <div class="flex flex-col gap-1 flex-1 min-w-0">
                      <div class="font-semibold text-base truncate" x-text="b.model"></div>
                      <div class="flex items-center gap-2">
                        <template x-if="b.status === 'sold'">
                          <span class="inline-block px-2 py-0.5 rounded bg-red-100 text-xs text-red-700 font-semibold flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>Sold Out</span>
                        </template>
                        <template x-if="b.status !== 'sold'">
                          <span class="inline-block px-2 py-0.5 rounded bg-slate-100 text-xs text-slate-600" x-text="b.status"></span>
                        </template>
                        <span class="text-xs text-slate-500 truncate" x-text="'ID: ' + b.id"></span>
                      </div>
                    </div>
                    <button type="button" @click="editBike(b)" title="Edit" class="text-slate-400 hover:text-indigo-600 flex-shrink-0 ml-2">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536M9 13l6.536-6.536a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-2.828 0L9 13zm-2 2v3h3" /></svg>
                    </button>
                  </div>
                  <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="px-2 py-1 rounded bg-blue-50 text-blue-700 truncate">
                      <span class="font-medium">Reg#:</span> <span x-text="b.registration_number||'-'"></span>
                    </div>
                    <div class="px-2 py-1 rounded bg-indigo-50 text-indigo-700">
                      <span class="font-medium">Year:</span> <span x-text="b.year||'-'"></span>
                    </div>
                    <div class="px-2 py-1 rounded bg-pink-50 text-pink-700 truncate">
                      <span class="font-medium">Color:</span> <span x-text="b.color||'-'"></span>
                    </div>
                    <div class="px-2 py-1 rounded bg-slate-100 text-slate-700 truncate">
                      <span class="font-medium">Dealer:</span> <span x-text="b.dealer||'-'"></span>
                    </div>
                  </div>
                  <div class="flex justify-between items-center pt-2 border-t border-slate-100 gap-2">
                    <button type="button" @click="editBike(b)" class="flex-1 px-2 py-1.5 text-sm text-white bg-indigo-600 hover:bg-indigo-700 rounded font-medium transition-colors shadow-sm">
                      Edit
                    </button>
                    <template x-if="b.status !== 'sold'">
                      <button type="button" @click="openMarkSoldModal(b)" class="flex-1 px-2 py-1.5 text-sm text-white bg-green-600 hover:bg-green-700 rounded font-medium transition-colors">
                        Mark Sold
                      </button>
                    </template>
                    <template x-if="b.status === 'sold'">
                      <button type="button" disabled class="flex-1 px-2 py-1.5 text-sm text-white bg-gray-400 cursor-not-allowed rounded font-medium transition-colors" title="This bike has already been sold">
                        Sold Out
                      </button>
                    </template>
                  </div>
                  <div class="grid grid-cols-3 gap-2 pt-2 text-xs border-t border-slate-100">
                    <div>
                      <div class="text-slate-600 font-medium">Buy</div>
                      <div class="text-green-700 font-semibold" x-text="formatCurrency(b.buy_price)"></div>
                    </div>
                    <div>
                      <div class="text-slate-600 font-medium">Costs</div>
                      <div class="text-yellow-700 font-semibold" x-text="formatCurrency(b.total_cost - b.buy_price)"></div>
                    </div>
                    <div>
                      <div class="text-slate-600 font-medium">Total</div>
                      <div class="text-slate-700 font-semibold" x-text="formatCurrency(b.total_cost)"></div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
            <div x-show="bikes.length===0" class="text-sm text-slate-500 mt-4 text-center">No bikes yet.</div>
            <div x-show="bikes.length>0 && filteredBikes.length===0" class="text-sm text-slate-500 mt-4 text-center">No bikes found.</div>
            <template x-if="filteredBikes.length===0 && !error">
              <div class="text-xs text-slate-400 mt-2 text-center">Debug: filteredBikes array = <span x-text="JSON.stringify(filteredBikes)"></span></div>
            </template>
          </section>
        </div>
        <!-- Form RIGHT -->
        <div class="w-full lg:w-96" :class="{ 'order-1 lg:order-2': showForm, 'order-2 lg:order-2': !showForm }" x-show="showForm" x-transition>
          <!-- Inventory Form UI -->
          <section id="inventory-form" x-ref="invForm" class="bg-white p-5 md:p-6 rounded-xl shadow-card border border-slate-100">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold" x-text="editingId ? 'Edit Bike' : 'Add Bike'"></h2>
              <button type="button" @click="showForm = false; editingId = null; resetForm()" title="Close" class="text-slate-400 hover:text-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>
            <form @submit.prevent="onSubmit()" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-600">Name</label>
                <input x-model="form.model" type="text" required class="mt-1 input" list="model-history" />
                <datalist id="model-history">
                  <template x-for="m in modelHistory" :key="m">
                    <option :value="m">{{m}}</option>
                  </template>
                </datalist>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-600">Registration Number</label>
                <input x-model="form.registration_number" type="text" class="mt-1 input" placeholder="e.g. MH12AB1234" />
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-medium text-slate-600">Year</label>
                  <input x-model.number="form.year" type="number" min="1900" max="2100" class="mt-1 input" placeholder="Year" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-600">Color</label>
                  <input x-model="form.color" type="text" class="mt-1 input" list="color-history" />
                  <datalist id="color-history">
                    <template x-for="c in colorHistory" :key="c">
                      <option :value="c">{{c}}</option>
                    </template>
                  </datalist>
                </div>
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-medium text-slate-600">Buy Price</label>
                  <input x-model.number="form.buy_price" type="number" step="0.01" min="0" class="mt-1 input" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-600">Dealer</label>
                  <input x-model="form.dealer" type="text" class="mt-1 input" list="dealer-history" />
                  <datalist id="dealer-history">
                    <template x-for="d in dealerHistory" :key="d">
                      <option :value="d">{{d}}</option>
                    </template>
                  </datalist>
                </div>
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-medium text-slate-600">Status</label>
                  <select x-model="form.status" class="mt-1 input">
                    <option value="in_stock">in_stock</option>
                    <option value="ready">ready</option>
                    <option value="in_repair">in_repair</option>
                    <option value="sold">sold</option>
                    <option value="not_ready">not_ready</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-600">Purchase Date</label>
                  <input x-model="form.purchase_date" type="date" class="mt-1 input" />
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-600">Sell Date (optional)</label>
                <input x-model="form.sell_date" type="date" class="mt-1 input" />
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-600">Notes</label>
                <textarea x-model="form.notes" rows="3" class="mt-1 input"></textarea>
              </div>

              <div>
                <h3 class="text-sm font-medium text-slate-700">Bike Costs</h3>
                <template x-for="(c, i) in form.costs" :key="i">
                  <div class="mt-2 grid grid-cols-12 gap-2 items-center">
                    <select x-model="c.category" class="col-span-4 input">
                      <option value="transport">transport</option>
                      <option value="repair">repair</option>
                      <option value="parts">parts</option>
                      <option value="washing">washing</option>
                      <option value="fuel">fuel</option>
                      <option value="other">other</option>
                    </select>
                    <input x-model.number="c.amount" type="number" step="0.01" min="0" class="col-span-4 input" placeholder="amount" />
                    <input x-model="c.date" type="date" class="col-span-3 input" />
                    <button type="button" @click="removeCost(i)" class="col-span-1 text-red-500">✕</button>
                  </div>
                </template>
                <div class="mt-2">
                  <button type="button" @click="addCost()" class="btn-secondary">Add cost</button>
                </div>
              </div>

              <div class="flex items-center gap-3">
                <button type="submit" :disabled="loading" class="btn-primary" x-show="!editingId">Add Bike</button>
                <button type="submit" :disabled="loading" class="btn-primary bg-green-600 hover:bg-green-700" x-show="editingId">Update Bike</button>
                <button type="button" @click="resetForm(); editingId=null; showForm=false" x-show="editingId" class="btn-secondary">Cancel</button>
                <div x-show="success" x-text="success" class="text-sm text-green-600"></div>
                <div x-show="error" x-text="error" class="text-sm text-red-600"></div>
              </div>
            </form>
          </section>
        </div>
      </div>
      </div>

      <!-- Mark Sold Modal -->
      <template x-if="showMarkSoldModal">
      <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" x-transition>
      <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-white border-b p-6 flex items-center justify-between">
          <h3 class="text-xl font-semibold">Mark Bike as Sold</h3>
          <button @click="showMarkSoldModal = false; resetMarkSoldForm()" class="text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form @submit.prevent="submitMarkSold" class="p-6 space-y-4">
          <!-- Bike Info (Read-only) -->
          <div class="bg-slate-50 p-4 rounded-lg">
            <div class="font-semibold text-slate-700 mb-2" x-text="markSoldBike?.model"></div>
            <div class="grid grid-cols-2 gap-2 text-sm text-slate-600">
              <div><span class="font-medium">Year:</span> <span x-text="markSoldBike?.year || '-'"></span></div>
              <div><span class="font-medium">Color:</span> <span x-text="markSoldBike?.color || '-'"></span></div>
              <div><span class="font-medium">Buy Price:</span> <span x-text="formatCurrency(markSoldBike?.buy_price || 0)"></span></div>
              <div><span class="font-medium">Total Cost:</span> <span x-text="formatCurrency(markSoldBike?.total_cost || 0)"></span></div>
            </div>
          </div>

          <!-- Sale Details -->
          <div class="space-y-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Sale Date *</label>
              <input x-model="markSoldForm.sale_date" type="date" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Selling Price *</label>
              <input x-model="markSoldForm.sell_price" type="number" step="0.01" min="0" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="0.00" />
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Profit (Optional)</label>
              <input x-model="markSoldForm.profit" type="number" step="0.01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="0.00" />
              <p class="text-xs text-slate-500 mt-1">For commission or shared investment adjustments. Calculated profit is sell_price - total_cost.</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Sale Channel *</label>
              <select x-model="markSoldForm.channel" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                <option value="">Select channel</option>
                <option value="OLX">OLX</option>
                <option value="SHOP_VISIT">Shop Visit</option>
                <option value="CUSTOMER_REFERRAL">Customer Referral</option>
                <option value="VIA_DEALER">Via Dealer</option>
                <option value="INSTAGRAM">Instagram</option>
                <option value="FB_MARKETPLACE">Facebook Marketplace</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
          </div>

          <!-- Customer Details -->
          <div class="border-t pt-4">
            <h4 class="font-medium text-slate-700 mb-3">Customer Details (Optional)</h4>
            <div class="space-y-3">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Customer Name</label>
                <input x-model="markSoldForm.customer_name" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Customer name" />
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Customer Phone</label>
                <input x-model="markSoldForm.customer_phone" type="tel" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Phone number" />
              </div>
            </div>
          </div>

          <!-- Payment Details -->
          <div class="border-t pt-4">
            <h4 class="font-medium text-slate-700 mb-3">Payment Details</h4>
            <div class="space-y-3">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Payment Mode (Optional)</label>
                <select x-model="markSoldForm.payment_mode" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">                  <option value="">Select payment mode</option>                  <option value="cash">Cash</option>
                  <option value="online">Online</option>
                  <option value="mixed">Mixed</option>
                </select>
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Amount Received (Optional)</label>
                <input x-model="markSoldForm.amount_paid" type="number" step="0.01" min="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="0.00" />
              </div>

              <template x-if="markSoldForm.payment_mode === 'mixed'">
                <div class="grid grid-cols-2 gap-3 p-3 bg-blue-50 rounded-lg">
                  <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Cash Amount</label>
                    <input x-model="markSoldForm.cash_amount" type="number" step="0.01" min="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="0.00" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Online Amount</label>
                    <input x-model="markSoldForm.online_amount" type="number" step="0.01" min="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="0.00" />
                  </div>
                </div>
              </template>

              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Payment Pending</label>
                <div class="text-sm text-slate-600 p-2 bg-slate-50 rounded" x-text="'₹' + (markSoldForm.sell_price - markSoldForm.amount_paid).toFixed(2)"></div>
              </div>
            </div>
          </div>

          <!-- Notes -->
          <div class="border-t pt-4">
            <label class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
            <textarea x-model="markSoldForm.notes" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" rows="2" placeholder="Any additional notes about this sale..."></textarea>
          </div>

          <!-- Errors and Status -->
          <div x-show="markSoldError" class="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700" x-text="markSoldError"></div>
          <div x-show="markSoldSuccess" class="p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-700" x-text="markSoldSuccess"></div>

          <!-- Form Actions -->
          <div class="flex gap-3 pt-4 border-t">
            <button type="submit" :disabled="markSoldLoading" class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white rounded-lg font-medium transition-colors">
              <span x-show="!markSoldLoading">Mark as Sold</span>
              <span x-show="markSoldLoading">Processing...</span>
            </button>
            <button type="button" @click="showMarkSoldModal = false; resetMarkSoldForm()" class="px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium transition-colors">Cancel</button>
          </div>
        </form>
      </div>
    </div>
      </template>
        </main>
      </div>
    </div>

    <script>
      function toggleMobileMenu() {
        const sidebar = document.getElementById('mobile-sidebar');
        const overlay = document.getElementById('mobile-menu-overlay');
        const body = document.body;
        const isActive = sidebar.classList.contains('active');
        
        if (isActive) {
          sidebar.classList.remove('active');
          overlay.classList.remove('active');
          body.style.overflow = '';
          body.style.position = '';
          body.style.width = '';
        } else {
          sidebar.classList.add('active');
          overlay.classList.add('active');
          body.style.overflow = 'hidden';
          body.style.position = 'fixed';
          body.style.width = '100%';
        }
      }
      
      // Close menu when clicking on a link
      document.addEventListener('DOMContentLoaded', () => {
        const sidebar = document.getElementById('mobile-sidebar');
        if (sidebar) {
          sidebar.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
              if (window.innerWidth < 768) {
                toggleMobileMenu();
              }
            });
          });
        }
        
        // Ensure body can scroll on desktop
        if (window.innerWidth >= 768) {
          document.body.style.overflow = '';
          document.body.style.position = '';
        }
      });
    </script>
    <script type="module" src="js/notifications.js"></script>
    <link rel="stylesheet" href="css/notifications.css" />
    <script type="module" src="js/inventory.js"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  </body>
</html>
